name: Content Recovery RPO Monitor

on:
  schedule:
    - cron: "15,45 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: content-recovery-monitor
  cancel-in-progress: true

jobs:
  verify:
    if: ${{ vars.CONTENT_RECOVERY_MONITOR_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: content-backup
    env:
      CONTENT_DATABASE_PROJECT_REF: ${{ vars.CONTENT_DATABASE_PROJECT_REF }}
      CONTENT_DATABASE_TOPOLOGY: ${{ vars.CONTENT_DATABASE_TOPOLOGY }}
      CONTENT_SHARED_PROJECT_ACK: ${{ vars.CONTENT_SHARED_PROJECT_ACK }}
      SUPABASE_MANAGEMENT_API_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_API_TOKEN }}
      BACKUP_BUCKET: bubble-content-backups
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_BACKUP_MONITOR_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_BACKUP_MONITOR_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      CONTENT_RECOVERY_CALLBACK_URL: ${{ vars.CONTENT_RECOVERY_CALLBACK_URL }}
      CONTENT_RECOVERY_CALLBACK_SECRET: ${{ secrets.CONTENT_RECOVERY_CALLBACK_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0

      - name: Validate isolated monitor credentials
        run: node scripts/validate-content-production-config.mjs workflow-recovery-monitor

      - name: Read PITR and encrypted-backup freshness
        run: |
          curl --fail --silent --show-error \
            --header "Authorization: Bearer $SUPABASE_MANAGEMENT_API_TOKEN" \
            "https://api.supabase.com/v1/projects/$CONTENT_DATABASE_PROJECT_REF/database/backups" \
            > pitr-status.json
          aws s3api list-objects-v2 \
            --bucket "$BACKUP_BUCKET" \
            --prefix database/ \
            --endpoint-url "$R2_ENDPOINT" \
            > backup-objects.json
          node scripts/assert-content-recovery-health.mjs pitr-status.json backup-objects.json 3600 \
            > recovery-health-evidence.json

      - name: Publish current health to the Admin dashboard
        run: |
          signature="$(node -e "const c=require('node:crypto'),f=require('node:fs');process.stdout.write(c.createHmac('sha256',process.env.CONTENT_RECOVERY_CALLBACK_SECRET).update(f.readFileSync('recovery-health-evidence.json')).digest('hex'))")"
          curl --fail --silent --show-error \
            --header "Content-Type: application/json" \
            --header "X-Content-Signature: $signature" \
            --data-binary @recovery-health-evidence.json \
            "$CONTENT_RECOVERY_CALLBACK_URL"

      - name: Upload short-lived health evidence
        uses: actions/upload-artifact@v4
        with:
          name: content-recovery-health-${{ github.run_id }}
          path: recovery-health-evidence.json
          retention-days: 14
          if-no-files-found: error
