name: Build and Verify Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: build-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.17
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            astro/package-lock.json

      - name: Setup Hugo 0.147.9
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.9"
          extended: true

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix astro

      - name: Verify Worker and data contracts
        run: npm test

      - name: Verify Hugo and Astro daily parity
        run: npm run verify:renderers

      - name: Build and verify the final Astro release artifact
        run: npm run verify --prefix astro

      - name: Upload immutable Astro artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist-${{ github.sha }}
          path: astro/dist
          if-no-files-found: error
          retention-days: 14
