name: Worker CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  worker-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.17
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Worker security tests
        run: npm run test:worker

      - name: Bundle production Worker
        run: npm run worker:check

      - name: Bundle isolated staging Worker
        run: npm run worker:check:staging

  renderer-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.17
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            astro/package-lock.json

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.9"
          extended: true

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix astro

      - name: Verify Astro
        run: npm run verify --prefix astro

      - name: Verify Hugo and Astro daily parity
        run: npm run verify:renderers
