name: Worker CI

on:
  pull_request:
    branches: [main, 'codex/phase1d-protection-drill-*']
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  worker-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.17
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Worker security tests
        run: npm run test:worker

      - name: Bundle production Worker
        run: npm run worker:check

      - name: Bundle isolated staging Worker
        run: npm run worker:check:staging

  renderer-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.17
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            astro/package-lock.json

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.9"
          extended: true

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix astro

      - name: Verify Astro
        run: npm run verify --prefix astro

      - name: Verify Hugo and Astro daily parity
        run: npm run verify:renderers

  database-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Verify migrations, idempotency, and RLS
        run: bash scripts/test-supabase-local.sh

  promote-publication:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'automation/daily/')
    needs: [worker-security, renderer-parity, database-security]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout publication candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Verify publication promotion policy
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git fetch origin "$PR_HEAD_SHA" --no-tags
          node scripts/verify-publication-pr.mjs

      - name: Merge verified daily publication
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: gh pr merge "$PR_URL" --merge --delete-branch --match-head-commit "$PR_HEAD_SHA"

      - name: Dispatch GitHub Pages build for merged main
        if: github.event.pull_request.base.ref == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-and-deploy.yml --ref main
