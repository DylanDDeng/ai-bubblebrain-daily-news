name: Verify Daily Publication Pairs

on:
  push:
    branches:
      - main
    paths:
      - 'daily/*.md'
      - 'content/daily/*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-daily:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Verify changed daily files were published atomically
      env:
        EVENT_BEFORE: ${{ github.event.before }}
      run: |
        before="$EVENT_BEFORE"
        if [[ ! "$before" =~ ^[0-9a-f]{40}$ ]] || [[ "$before" =~ ^0+$ ]]; then
          before="$(git rev-parse "$GITHUB_SHA^")"
        fi

        changed_dates="$(
          git diff --name-only "$before" "$GITHUB_SHA" -- \
            'daily/*.md' 'content/daily/*.md' \
            | sed -E 's#^(daily|content/daily)/##' \
            | sort -u
        )"

        if [[ -z "$changed_dates" ]]; then
          echo "No daily files changed in the selected commit range."
          exit 0
        fi

        while IFS= read -r filename; do
          source_file="daily/$filename"
          mirror_file="content/daily/$filename"
          if [[ ! -f "$source_file" || ! -f "$mirror_file" ]]; then
            echo "::error::Daily publication must contain both $source_file and $mirror_file"
            exit 1
          fi
          if ! cmp --silent "$source_file" "$mirror_file"; then
            echo "::error::Daily publication pair differs for $filename"
            exit 1
          fi
          echo "Verified atomic daily publication pair: $filename"
        done <<< "$changed_dates"
