name: Auto Sync Daily to Hugo

on:
  push:
    branches:
      - main
    paths:
      - 'daily/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-daily:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Sync daily content to Hugo
      run: bash scripts/sync-daily-to-hugo.sh

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 检查是否有更改
        if [ -n "$(git status --porcelain content/daily/)" ]; then
          git add content/daily/
          git commit -m "Auto sync: 同步每日内容到 Hugo [skip ci]"
          git push
          echo "✅ 更改已推送"
        else
          echo "ℹ️  没有需要同步的内容"
        fi
