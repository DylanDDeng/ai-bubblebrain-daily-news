# Cloudflare Pages release contract

[build]
  command = "npm ci && npm ci --prefix astro && npm run build --prefix astro && npm run verify:site"
  publish = "astro/dist/client"

[build.environment]
  NODE_VERSION = "22.17.0"

[context.preview]
  command = "npm ci && npm ci --prefix astro && npm run build --prefix astro && npm run verify:site"

[context.production]
  command = "npm ci && npm ci --prefix astro && npm run build --prefix astro && npm run verify:site"
