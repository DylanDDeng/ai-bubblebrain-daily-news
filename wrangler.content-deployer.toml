name = "bubble-content-deployer"
main = "workers/content/deployer/index.ts"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

routes = [
  { pattern = "content-deployer.bubblenews.today", custom_domain = true }
]

[triggers]
crons = ["* * * * *"]

[vars]
GITHUB_REPOSITORY = "DylanDDeng/ai-bubblebrain-daily-news"
GITHUB_WORKFLOW_REF = "main"

[[hyperdrive]]
binding = "CONTENT_DB"
id = "136110d1dbf246d8b655e047cb4a8f0d"

[[r2_buckets]]
binding = "REPORT_SNAPSHOTS"
bucket_name = "bubble-content-report-snapshots"

[[r2_buckets]]
binding = "SITE_MANIFESTS"
bucket_name = "bubble-content-site-manifests"

# Set GITHUB_TOKEN, DEPLOY_CALLBACK_SECRET, PREVIEW_DISPATCH_SECRET,
# CONTENT_BUILD_API_SECRET, CODE_RELEASE_SECRET and RECOVERY_MONITOR_SECRET
# as Worker secrets.
